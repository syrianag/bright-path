
# ===============================
#         CI/CD PIPELINE
# ===============================
# Combines lint/test steps with Docker Compose build/test and deploy jobs
# Notes are included for clarity and best practices

name: CI/CD

on:
  push:
    branches: [main, develop]  # ← triggers on main and develop
  pull_request:
    branches: [main]           # ← triggers on PRs to main

jobs:
  # ── JOB 1: always runs ──────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}  # ← secret injected
    steps:
      - name: Checkout code
        uses: actions/checkout@v4          # ← copies repo to runner

      # --- Linting steps from original workflow ---
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Run Linter
        run: npm run lint
      # --- End linting steps ---

      # --- Docker Compose build/test steps ---
      - name: Build containers
        run: docker compose build          # ← builds your Dockerfile
      - name: Start services
        run: docker compose up -d          # ← starts app + db
      - name: Wait for database
        run: sleep 15                      # ← gives Postgres time
      - name: Run migrations
        run: docker compose exec -T app npx prisma migrate deploy
      - name: Run tests
        run: docker compose exec -T app npm test  # ← fails if tests fail
      # --- End Docker Compose steps ---

      - name: Tear down
        if: always()                       # ← runs even if step failed
        run: docker compose down -v
        # Pro Tip: always use if: always() on teardown to avoid port conflicts

  # ── JOB 2: only runs on main, only if Job 1 passed ──
  deploy:
    needs: build-and-test                  # ← blocked until Job 1 green
    if: github.ref == 'refs/heads/main'   # ← skipped on PRs
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Clone or update repo on EC2
            if [ ! -d ~/my-app ]; then
              git clone https://github.com/YOUR-USERNAME/YOUR-REPO.git ~/my-app
            fi
            cd ~/my-app && git pull origin main
            docker compose down
            docker compose up --build -d
            docker compose exec app npx prisma migrate deploy
        # Pro Tip: needs: build-and-test ensures deploy only runs after tests pass

       