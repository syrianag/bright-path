
# ===============================
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to EC2 via SSM
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          EC2_DEPLOY_KEY: ${{ secrets.EC2_DEPLOY_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -euxo pipefail
          # Build deploy script to run on the instance
          cat > deploy.sh <<'SH'
#!/bin/bash
set -eux
HOME_DIR="/home/ubuntu"
mkdir -p "$HOME_DIR/.ssh"
cat > "$HOME_DIR/.ssh/deploy_key" <<'KEY'
${EC2_DEPLOY_KEY}
KEY
chmod 600 "$HOME_DIR/.ssh/deploy_key"
chown ubuntu:ubuntu "$HOME_DIR/.ssh/deploy_key"
ssh-keyscan github.com >> "$HOME_DIR/.ssh/known_hosts" 2>/dev/null || true
# Use deploy key for git operations
export GIT_SSH_COMMAND="ssh -i $HOME_DIR/.ssh/deploy_key -o StrictHostKeyChecking=yes"
if [ ! -d "$HOME_DIR/my-app" ]; then
  sudo -u ubuntu git clone git@github.com:syrianag/bright-path.git "$HOME_DIR/my-app"
fi
sudo -u ubuntu bash -lc "cd $HOME_DIR/my-app && git pull origin main"
# Write .env
sudo -u ubuntu bash -lc "cat > $HOME_DIR/my-app/.env <<EOF
DATABASE_URL=${DATABASE_URL}
POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
SESSION_SECRET=${SESSION_SECRET}
NODE_ENV=production
EOF"
# Install Docker Compose plugin if missing
if ! docker compose version >/dev/null 2>&1; then
  echo "Docker Compose plugin not found — installing..."
  ARCH="$(uname -m)"
  if [ "$ARCH" = "x86_64" ] || [ "$ARCH" = "amd64" ]; then
    BIN_ARCH="linux-x86_64"
  elif [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
    BIN_ARCH="linux-aarch64"
  else
    BIN_ARCH="linux-x86_64"
  fi
  COMPOSE_VER="v2.21.0"
  sudo mkdir -p /usr/local/lib/docker/cli-plugins
  sudo curl -fSL "https://github.com/docker/compose/releases/download/${COMPOSE_VER}/docker-compose-${BIN_ARCH}" -o /usr/local/lib/docker/cli-plugins/docker-compose
  sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
fi
cd "$HOME_DIR/my-app"
docker compose -f docker-compose.yml down || true
docker compose -f docker-compose.yml up --build -d
docker compose -f docker-compose.yml run --rm app npm exec --yes --package=prisma@6.19.2 -- prisma migrate deploy
SH

          # Use jq to convert script into JSON array of lines
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y jq
          fi
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "deploy from GitHub Actions" \
            --parameters commands="$(jq -Rs -c 'split("\n")[:-1]' deploy.sh)" \
            --query "Command.CommandId" --output text)

          echo "Sent SSM command: $CMD_ID"

          # Wait for completion
          for i in {1..120}; do
            STATUS=$(aws ssm list-command-invocations --command-id "$CMD_ID" --details --query "CommandInvocations[0].Status" --output text || true)
            echo "SSM status: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              break
            fi
            if [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "DeliveryTimedOut" ]; then
              aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$EC2_INSTANCE_ID" || true
              exit 1
            fi
            sleep 5
          done
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$EC2_INSTANCE_ID"
            # Ensure GitHub host key is known to avoid interactive prompt
            mkdir -p ~/.ssh
            ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null || true

            if [ ! -d ~/my-app ]; then
              git clone git@github.com:syrianag/bright-path.git ~/my-app
            fi
            cd ~/my-app && git pull origin main
            # Ensure Docker Compose plugin is available (install if missing)
            if ! docker compose version >/dev/null 2>&1; then
              echo "Docker Compose plugin not found — installing..."
              ARCH="$(uname -m)"
              if [ "$ARCH" = "x86_64" ] || [ "$ARCH" = "amd64" ]; then
                BIN_ARCH="linux-x86_64"
              elif [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
                BIN_ARCH="linux-aarch64"
              else
                BIN_ARCH="linux-x86_64"
              fi
              COMPOSE_VER="v2.21.0"
              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              sudo curl -fSL "https://github.com/docker/compose/releases/download/${COMPOSE_VER}/docker-compose-${BIN_ARCH}" -o /usr/local/lib/docker/cli-plugins/docker-compose
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
            fi
            # Create .env on the EC2 host from GitHub Secrets so Compose has required variables
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
            echo "SESSION_SECRET=${{ secrets.SESSION_SECRET }}" >> .env
            echo "NODE_ENV=production" >> .env
            docker compose -f docker-compose.yml down
            docker compose -f docker-compose.yml up --build -d
            docker compose -f docker-compose.yml run --rm app npm exec --yes --package=prisma@6.19.2 -- prisma migrate deploy